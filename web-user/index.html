<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>CryptoClock Pro</title>
<style>
  :root{ --bg:#080a0d; --panel:#12161d; --panel2:#1a212c; --accent:#F0B90B; --accent2:#ffd23f; --muted:#7d8794; --line:#262e3a; --ok:#0ECB81; --err:#ff5b5b; --txt:#e9ecef; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; color:var(--txt); font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(1100px 420px at 50% -160px, rgba(240,185,11,.10), transparent 70%),
      radial-gradient(700px 500px at 110% 10%, rgba(14,203,129,.06), transparent 60%),
      var(--bg); background-attachment:fixed; }
  a{ color:var(--accent); }
  .wrap{ max-width:540px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
  header{ position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:8px; padding:13px 16px;
    background:rgba(8,10,13,.72); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--line); }
  header .back{ cursor:pointer; color:var(--muted); font-size:26px; line-height:1; padding:0 6px; border-radius:8px; transition:.12s; }
  header .back:hover{ color:var(--txt); background:var(--panel2); }
  header h1{ font-size:17px; margin:0; color:var(--txt); font-weight:700; flex:1; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header .act{ color:var(--accent); cursor:pointer; font-size:13px; font-weight:600; padding:6px 10px; border-radius:8px; background:rgba(240,185,11,.10); }
  header .act:hover{ background:rgba(240,185,11,.18); }
  main{ flex:1; padding:16px 16px 80px; }
  .panel{ background:linear-gradient(180deg, rgba(255,255,255,.025), transparent), var(--panel); border:1px solid var(--line); border-radius:16px; padding:15px; margin-bottom:12px; box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px -18px rgba(0,0,0,.8); }
  .row{ display:flex; align-items:center; gap:11px; }
  .row.tile{ cursor:pointer; transition:.14s; border-radius:12px; margin:-4px; padding:4px; }
  .row.tile:hover{ background:rgba(255,255,255,.03); transform:translateX(2px); }
  .row .ico{ width:42px; height:42px; border-radius:12px; background:var(--panel2); display:flex; align-items:center; justify-content:center; font-size:20px; flex:none; box-shadow:0 0 0 1px rgba(255,255,255,.04) inset; }
  .grow{ flex:1; min-width:0; }
  .ttl{ font-weight:650; letter-spacing:.1px; } .sub{ color:var(--muted); font-size:12.5px; }
  .arr{ color:var(--muted); font-size:20px; }
  label.fld{ display:block; margin:14px 0 5px; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.6px; font-weight:600; }
  input[type=text],input[type=email],input[type=number],input[type=password],select,textarea{
    width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--txt); border-radius:11px; padding:11px 13px; font-size:15px; outline:none; transition:.12s; }
  input:focus,select:focus,textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(240,185,11,.14); }
  input[type=range]{ -webkit-appearance:none; appearance:none; height:6px; border-radius:6px; background:var(--panel2); padding:0; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); border:3px solid #0b0e11; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.5); }
  button{ font:inherit; cursor:pointer; border-radius:11px; border:1px solid var(--line); background:var(--panel2); color:var(--txt); padding:10px 14px; transition:.12s; }
  button:hover{ border-color:#39424f; }
  button.primary{ background:linear-gradient(180deg, var(--accent2), var(--accent)); color:#1a1300; border:none; font-weight:800; width:100%; padding:14px; box-shadow:0 8px 22px -10px rgba(240,185,11,.55); letter-spacing:.2px; }
  button.primary:hover{ filter:brightness(1.05); }
  button.ghost{ background:transparent; }
  button.danger{ color:var(--err); border-color:#5a2730; background:transparent; }
  button:disabled{ opacity:.45; cursor:default; box-shadow:none; }
  .switch{ position:relative; width:48px; height:28px; flex:none; }
  .switch input{ display:none; }
  .switch span{ position:absolute; inset:0; background:#39424f; border-radius:20px; transition:.18s; }
  .switch span:before{ content:""; position:absolute; width:22px; height:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.18s; box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .switch input:checked + span{ background:linear-gradient(180deg,var(--accent2),var(--accent)); }
  .switch input:checked + span:before{ transform:translateX(20px); }
  .chip{ display:inline-flex; align-items:center; gap:7px; background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:7px 12px; margin:5px 5px 0 0; font-size:13px; font-weight:600; }
  .chip b{ cursor:pointer; color:var(--muted); font-weight:400; }
  .chip b:hover{ color:var(--err); }
  .swatch{ width:34px; height:34px; border-radius:9px; border:2px solid var(--line); flex:none; cursor:pointer; padding:0; box-shadow:0 0 0 1px rgba(0,0,0,.3) inset; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:#1b2330; border:1px solid var(--line); padding:11px 18px; border-radius:12px; z-index:50; max-width:90%; box-shadow:0 12px 30px -8px rgba(0,0,0,.7); font-weight:600; animation:pop .2s ease; }
  @keyframes pop{ from{ transform:translate(-50%,8px); opacity:0; } }
  .err{ color:var(--err); } .ok{ color:var(--ok); }
  .center{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; padding:30px; }
  .logo{ width:100px; height:100px; border-radius:28px; background:linear-gradient(160deg,#1c232e,#10141a); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:48px; box-shadow:0 18px 50px -16px rgba(240,185,11,.4), 0 0 0 1px rgba(240,185,11,.15) inset; }
  .muted{ color:var(--muted); } .small{ font-size:13px; }
  .divider{ display:flex; align-items:center; gap:10px; color:var(--muted); margin:16px 0; font-size:13px; }
  .divider:before,.divider:after{ content:""; height:1px; background:var(--line); flex:1; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .spin{ width:18px; height:18px; border:2px solid #39424f; border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; display:inline-block; vertical-align:middle; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  .thumb{ width:60px; height:60px; object-fit:cover; border-radius:10px; border:1px solid var(--line); }
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; background:rgba(14,203,129,.12); color:var(--ok); letter-spacing:.3px; }
  .pill.dot:before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--ok); box-shadow:0 0 6px var(--ok); }
  .secttl{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin:0 0 10px; }
  /* The save bar is fixed to the viewport but must stay centered within the
   * .wrap content area (max-width:540px). Pinning to left:0/right:0 would
   * center the button on the viewport instead of the page content, making
   * the button look off-center on wide screens. */
  .savebar{ position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:min(100%, 540px); z-index:8; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(180deg, transparent, rgba(8,10,13,.9)30%); pointer-events:none; }
  .savebar > *{ pointer-events:auto; width:100%; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script type="module">
import mqtt from 'mqtt';

/* ===================== CONFIG ===================== *
 * Browser-safe values are injected by Vite from VITE_* environment variables.
 * Never put service_role keys or broker master passwords in this app. */
const CFG = {
  supabaseUrl: import.meta.env.VITE_SUPABASE_URL || '',
  supabaseAnonKey: import.meta.env.VITE_SUPABASE_ANON_KEY || '',
  hubBase: import.meta.env.VITE_HUB_BASE_URL || '',
  mqttWsUrl: import.meta.env.VITE_MQTT_WS_URL || '',
};

/* ===================== small utils ===================== */
const $ = (h)=>{ const t=document.createElement('template'); t.innerHTML=h.trim(); return t.content.firstElementChild; };
const el = (id)=>document.getElementById(id);
const esc = (s)=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg, cls=''){ const t=$(`<div class="toast ${cls}">${esc(msg)}</div>`); document.body.appendChild(t); setTimeout(()=>t.remove(), 2600); }
const LS = { get:(k)=>localStorage.getItem(k), set:(k,v)=>localStorage.setItem(k,v), del:(k)=>localStorage.removeItem(k) };

/* ===================== Supabase auth (REST + OAuth redirect) ===================== */
const Auth = {
  hdr(){ return { 'apikey':CFG.supabaseAnonKey, 'Content-Type':'application/json' }; },
  email(){ return LS.get('ccp_email'); },
  token(){ return LS.get('ccp_access_token'); },
  refreshToken(){ return LS.get('ccp_refresh_token'); },
  save(email, tok, refresh){
    LS.set('ccp_email', email||'');
    LS.set('ccp_access_token', tok||'');
    if(refresh) LS.set('ccp_refresh_token', refresh);
  },
  signOut(){
    MqttRpc.disconnect();
    LS.del('ccp_email');
    LS.del('ccp_access_token');
    LS.del('ccp_refresh_token');
  },
  tokenExpired(token, skewS=60){
    if(!token) return true;
    try{
      const p=JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/').padEnd(Math.ceil(token.split('.')[1].length/4)*4,'=')));
      return typeof p.exp!=='number'||p.exp<=Math.floor(Date.now()/1000)+skewS;
    }catch(_){ return true; }
  },
  async refresh(){
    const refresh=this.refreshToken();
    if(!refresh||!CFG.supabaseUrl||!CFG.supabaseAnonKey){ this.signOut(); return ''; }
    try{
      const r=await fetch(`${CFG.supabaseUrl}/auth/v1/token?grant_type=refresh_token`,{
        method:'POST',headers:this.hdr(),body:JSON.stringify({refresh_token:refresh})
      });
      if(!r.ok){ this.signOut(); return ''; }
      const j=await r.json(), tok=j.access_token||'';
      if(!tok){ this.signOut(); return ''; }
      this.save(j.user?.email||this.email(),tok,j.refresh_token||refresh);
      return tok;
    }catch(_){ this.signOut(); return ''; }
  },
  async accessToken(forceRefresh=false){
    const tok=this.token();
    if(!forceRefresh&&!this.tokenExpired(tok)) return tok;
    return this.refresh();
  },
  // Google: redirect through Supabase OAuth; token comes back in the URL hash.
  googleRedirect(){
    if(!CFG.supabaseUrl || !CFG.supabaseAnonKey){
      toast('Supabase is not configured (set VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY)', 'err'); return;
    }
    const url = new URL(`${CFG.supabaseUrl}/auth/v1/authorize`);
    url.searchParams.set('provider','google');
    url.searchParams.set('redirect_to', location.origin + location.pathname);
    location.assign(url.toString());
  },
  // Parse #access_token=... after an OAuth redirect; returns true if a session was captured.
  async captureHash(){
    // Supabase bounces back with #error=... when redirect_to isn't allow-listed.
    if(location.hash.includes('error=')){
      const e = new URLSearchParams(location.hash.slice(1));
      toast(decodeURIComponent(e.get('error_description')||e.get('error')||'OAuth failed'), 'err');
      history.replaceState({}, document.title, location.pathname);
      return false;
    }
    if(!location.hash.includes('access_token=')) return false;
    const p = new URLSearchParams(location.hash.slice(1));
    const tok = p.get('access_token'); if(!tok) return false;
    const refresh = p.get('refresh_token')||'';
    let email='';
    try{ const r=await fetch(`${CFG.supabaseUrl}/auth/v1/user`, {headers:{apikey:CFG.supabaseAnonKey, Authorization:'Bearer '+tok}}); const j=await r.json(); email=j.email||''; }catch(_){}
    this.save(email, tok, refresh);
    history.replaceState({}, document.title, location.pathname);
    return true;
  },
};

/* ===================== MQTT cloud RPC ===================== */
const MqttRpc = {
  client:null, userId:'', pending:new Map(),
  async connect(){
    if(this.client?.connected) return this;
    if(!CFG.mqttWsUrl) throw new Error('MQTT WSS URL is not configured');
    const token=await Auth.accessToken(), userId=jwtSubject(token);
    if(!token||!userId) throw new Error('Sign in again before connecting');
    this.userId=userId;
    const c=mqtt.connect(CFG.mqttWsUrl,{
      username:'web-user:'+userId,
      password:token,
      clientId:'ccp-user-'+randomId(),
      clean:true,
      reconnectPeriod:3000,
      connectTimeout:10000,
      protocolVersion:4,
    });
    this.client=c;
    c.on('message',(topic,bytes)=>{
      const id=topic.split('/').pop(), p=this.pending.get(id);
      if(!p) return;
      this.pending.delete(id); clearTimeout(p.timer);
      try{ const msg=JSON.parse(bytes.toString()); msg.ok===false?p.reject(new Error(msg.error||'Request failed')):p.resolve(msg.data??msg); }
      catch(e){ p.reject(e); }
    });
    c.on('close',()=>{ for(const[,p]of this.pending){clearTimeout(p.timer);p.reject(new Error('MQTT disconnected'));} this.pending.clear(); });
    await new Promise((resolve,reject)=>{
      const timer=setTimeout(()=>reject(new Error('MQTT connection timed out')),10000);
      c.once('connect',()=>{clearTimeout(timer);resolve();});
      c.once('error',(e)=>{clearTimeout(timer);reject(e);});
    });
    await new Promise((resolve,reject)=>c.subscribe(`ccp/web/user/${userId}/response/#`,{qos:1},e=>e?reject(e):resolve()));
    return this;
  },
  disconnect(){ this.client?.end(true); this.client=null; this.userId=''; },
  request(operation,deviceId,payload={},timeoutMs=12000){
    if(!this.client?.connected||!this.userId) return Promise.reject(new Error('MQTT gateway is not connected'));
    const id=randomId(), topic=`ccp/web/user/${this.userId}/request/${id}`;
    const body=JSON.stringify({id,operation,deviceId,payload,sentAt:new Date().toISOString()});
    return new Promise((resolve,reject)=>{
      const timer=setTimeout(()=>{this.pending.delete(id);reject(new Error('MQTT request timed out'));},timeoutMs);
      this.pending.set(id,{resolve,reject,timer});
      this.client.publish(topic,body,{qos:1},e=>{if(e){clearTimeout(timer);this.pending.delete(id);reject(e);}});
    });
  }
};
function randomId(){ return crypto.randomUUID?.().replaceAll('-','').slice(0,20)||Math.random().toString(36).slice(2,14); }
function jwtSubject(token){
  try{ const p=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'); return JSON.parse(atob(p.padEnd(Math.ceil(p.length/4)*4,'='))).sub||''; }
  catch(_){ return ''; }
}

/* ===================== Device transports ===================== */
class DeviceApi {
  constructor(host){ this.host = host.replace(/^https?:\/\//,'').replace(/\/$/,''); this.mode='lan'; this.supportsFiles=true; this.uploads=true; }
  u(p){ return `http://${this.host}${p}`; }
  async info(){ const r=await tfetch(this.u('/api/v1/info'), {}, 6000); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
  async getConfig(){ const r=await tfetch(this.u('/api/v1/config'), {}, 6000); const t=await r.text(); return t?JSON.parse(t):{}; }
  async setConfig(cfg){ const r=await fetch(this.u('/api/v1/config'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg)}); if(!r.ok) throw new Error('HTTP '+r.status); }
  async setBrightness(v){ await fetch(this.u('/api/v1/brightness'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({value:v})}); }
  identify(){ return fetch(this.u('/api/v1/identify'), {method:'POST'}); }
  wifiReset(){ return fetch(this.u('/api/v1/wifi/reset'), {method:'POST'}); }
  // NB: send paths RAW (literal slashes) — the firmware's query parser doesn't
  // URL-decode, so an encoded %2F would fail its "must be under pages/" check.
  async listFiles(dir){ const r=await fetch(this.u('/api/v1/files?dir='+dir)); const j=await r.json(); return {sd:j.sd_mounted===true, files:(j.files||[]).map(f=>({name:f.name,size:f.size}))}; }
  fileUrl(path){ return this.u('/api/v1/file?path='+path); }
  async upload(path, bytes){ const r=await fetch(this.u('/api/v1/upload?path='+path), {method:'POST', headers:{'Content-Type':'application/octet-stream'}, body:bytes}); if(!r.ok) throw new Error('HTTP '+r.status+': '+await r.text()); }
  async del(path){ await fetch(this.u('/api/v1/delete'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path})}); }
}

class CloudDeviceApi {
  constructor(rpc,deviceId){ this.rpc=rpc; this.deviceId=deviceId; this.mode='cloud'; this.supportsFiles=false; this.uploads=true; }
  async info(){ const d=await this.rpc.request('device.info',this.deviceId); return {...d,device_id:d.device_id||this.deviceId}; }
  async getConfig(){ const d=await Hub.getSettings(this.deviceId); return d.config||{}; }
  async setConfig(config){ await Hub.saveSettings(this.deviceId, config); }
  async setBrightness(value){ await this.rpc.request('device.command',this.deviceId,{type:'brightness',params:{value}}); }
  async identify(){ await this.rpc.request('device.command',this.deviceId,{type:'identify'}); }
  async wifiReset(){ await this.rpc.request('device.command',this.deviceId,{type:'wifi_reset'}); }
  fileUrl(){ return ''; }
  async listFiles(){ throw new Error('Photo files are managed locally from the mobile app'); }
  async upload(path, bytes){
    const m=/^pages\/([^/]+)\/assets\/(.+)$/.exec(path); if(!m) throw new Error('bad asset path');
    const slug=m[1], file=m[2];
    const key = slug==='profile' ? 'avatar' : slug==='weather' ? 'background' : file.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'_');
    await Hub.uploadAsset(this.deviceId, slug, key, bytes);
  }
  async listFiles(){ throw new Error('Photo files are managed locally from the mobile app'); }
  async del(){ throw new Error('Photo files are managed locally from the mobile app'); }
}

/* ===================== Hub API (cloud) ===================== */
function tfetch(url, opts={}, ms=8000){ const ac=new AbortController(); const t=setTimeout(()=>ac.abort(), ms); return fetch(url, {...opts, signal:ac.signal}).finally(()=>clearTimeout(t)); }
async function hubFetch(url, opts={}, ms=8000){
  let token=await Auth.accessToken();
  if(!token) return new Response(null,{status:401});
  const request=(t)=>tfetch(url,{...opts,headers:{...(opts.headers||{}),Authorization:'Bearer '+t}},ms);
  let r=await request(token);
  if(r.status===401){
    token=await Auth.accessToken(true);
    if(token) r=await request(token);
  }
  return r;
}
/* Centre-crop an image File to a square and re-encode as a `size`×`size` PNG (the
 * device wants small fixed-size assets — same as the Flutter app's avatar flow). */
function imgToSquarePng(file, size){
  return new Promise((res, rej)=>{ const img=new Image();
    img.onload=()=>{ const s=Math.min(img.width, img.height), sx=(img.width-s)/2, sy=(img.height-s)/2;
      const cv=document.createElement('canvas'); cv.width=cv.height=size; const cx=cv.getContext('2d');
      cx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      cv.toBlob(async b=>{ if(!b) return rej('encode failed'); res(new Uint8Array(await b.arrayBuffer())); }, 'image/png');
      URL.revokeObjectURL(img.src); };
    img.onerror=()=>rej('not a valid image'); img.src=URL.createObjectURL(file); });
}
const Hub = {
  async catalog(){ try{ const r=await tfetch(`${CFG.hubBase}/api/v1/store/items`); if(!r.ok) return []; const j=await r.json(); return Array.isArray(j)?j:[]; }catch(_){ return []; } },
  async entitlements(deviceId){ try{ const r=await hubFetch(`${CFG.hubBase}/api/v1/devices/${deviceId}/entitlements`); if(!r.ok) return []; const j=await r.json(); return Array.isArray(j)?j:[]; }catch(_){ return []; } },
  async myDevices(){ try{ const r=await hubFetch(`${CFG.hubBase}/api/v1/devices`); if(!r.ok) return []; const j=await r.json(); return Array.isArray(j)?j:[]; }catch(_){ return []; } },
  async getSettings(deviceId){
    const r = await hubFetch(`${CFG.hubBase}/api/v1/devices/${deviceId}/settings`,{},10000);
    if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,120));
    return await r.json();
  },
  async saveSettings(deviceId, config){
    const r = await hubFetch(`${CFG.hubBase}/api/v1/devices/${deviceId}/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({config})},15000);
    if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,120));
    return await r.json();
  },
  async claim(deviceId, code, name){
    try{ const r=await hubFetch(`${CFG.hubBase}/api/v1/devices/claim`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deviceId,code,name})},15000);
      if(r.ok) return {ok:true, device:await r.json().catch(()=>null)};
      if(r.status===401) return {error:'Please sign in again'};
      if(r.status===409) return {error:'This device is already linked to an account'};
      if(r.status===404) return {error:'Device ID not found — check the code on the box'};
      return {error:'HTTP '+r.status+' '+(await r.text()).slice(0,100)};
    }catch(e){ return {error:String(e)}; }
  },
  async uploadAsset(deviceId, slug, key, bytes){
    const u8 = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
    let bin=''; for(let i=0;i<u8.length;i++) bin+=String.fromCharCode(u8[i]);
    const dataBase64 = btoa(bin);
    const r = await hubFetch(`${CFG.hubBase}/api/v1/devices/${deviceId}/pages/${slug}/assets/${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataBase64})},20000);
    if(!r.ok) throw new Error('HTTP '+r.status+' '+(await r.text()).slice(0,120));
    return await r.json();
  },
  async checkout(slug, deviceId){
    try{ const r=await hubFetch(`${CFG.hubBase}/api/v1/store/checkout`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({slug, deviceId})}, 15000); if(r.status===401)return{error:'Please sign in again'}; return await r.json(); }catch(e){ return {error:String(e)}; } },
  async resolveSocial(url, platform){

/* ===================== DeviceController (mirror of the Flutter model) ===================== */
const NATIVE_TITLES = { clock:'Clock', crypto:'Crypto', slideshow:'Photo slideshow' };
const ALL_PAGES = ['clock','crypto','slideshow'];
const MAX_PAGES = 5;
class Ctrl {
  constructor(api, info){ this.api=api; this.info=info; this.config={}; this.brightness=(info.brightness??80); this.entitlements=[]; this.catalog=[]; }
  get deviceId(){ return this.info.device_id||'device'; }
  async load(){ this.config=await this.api.getConfig(); this.entitlements=await Hub.entitlements(this.deviceId); this.catalog=await Hub.catalog(); }
  has(slug){ return this.entitlements.includes(slug); }
  catalogItem(slug){ return this.catalog.find(c=>c.slug===slug||c.runtimeSlug===slug)||null; }
  section(k){ return Object.assign({}, this.config[k]||{}); }
  get enabledPages(){ return (this.config.pages||ALL_PAGES).slice(); }
  get availablePages(){
    const pages=[...ALL_PAGES];
    for(const c of this.catalog){ const ps=c.slug, rs=c.runtimeSlug||ps;
      if(c.kind==='PAGE'&&ps&&rs&&this.entitlements.includes(ps)&&!pages.includes(rs)) pages.push(rs); }
    for(const p of this.enabledPages) if(!pages.includes(p)) pages.push(p);
    return pages;
  }
  pageTitle(slug){ if(NATIVE_TITLES[slug]) return NATIVE_TITLES[slug]; const t=this.catalogItem(slug)?.title; if(t) return t; return slug? slug[0].toUpperCase()+slug.slice(1):slug; }
  get pagesFull(){ return this.enabledPages.length>=MAX_PAGES; }
  get symbols(){ return this.section('crypto').symbols || ['BTCUSDT','ETHUSDT','BNBUSDT','DOGEUSDT']; }
  patch(sec,key,val){ const s=this.section(sec); s[key]=val; this.config[sec]=s; }
  setTop(key,val){ this.config[key]=val; }
  setPageEnabled(page,on){ let p=this.enabledPages.slice();
    if(on){ if(p.includes(page)) return true; if(p.length>=MAX_PAGES) return false; p.push(page); }
    else { if(p.length<=1) return true; p=p.filter(x=>x!==page); }
    this.config.pages=p; return true; }
  movePage(slug,dir){ const p=this.enabledPages.slice(); const i=p.indexOf(slug); const j=i+dir; if(i<0||j<0||j>=p.length) return; [p[i],p[j]]=[p[j],p[i]]; this.config.pages=p; }
  async save(){
    const cfg=Object.assign({}, this.config, {pages:this.enabledPages, brightness:Math.round(this.brightness)});
    const e=Auth.email(); if(e) cfg.owner={email:e};
    await this.api.setConfig(cfg);
    if(this.api.mode==='lan' && CFG.hubBase && /^CCP\d{6}$/i.test(this.deviceId)){
      try{ await Hub.saveSettings(this.deviceId, cfg); }
      catch(err){ console.warn('Hub settings sync failed', err); }
    }
    this.config=cfg;
  }
}

/* Parse a scanned/typed claim string into {id, code}. Accepts a bare device id,
 * "<id> <code>" / "<id>|<code>", or a claim URL (…/claim/<code>?d=<id> or ?code=). */
function parseClaim(text){
  text=(text||'').trim(); let id='', code='';
  const mi=text.match(/(CCP\d{6}|ccp-[0-9a-f]{12})/i); if(mi) id=mi[1];
  const mc=text.match(/[?&](?:code|c)=([A-Za-z0-9_-]{4,})/) || text.match(/\/claim\/([A-Za-z0-9_-]{6,})/) || text.match(/[|: ]\s*([A-Za-z0-9_-]{6,12})\s*$/);
  if(mc) code=mc[1];
  return {id, code};
}
async function scanQR(onResult){
  if(!('BarcodeDetector' in window)){ toast('QR scan not supported here — type the ID instead','err'); return; }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); }
  catch(e){ toast('Camera permission needed to scan','err'); return; }
  const ov=document.createElement('div'); ov.style.cssText='position:fixed;inset:0;z-index:99;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px';
  const v=document.createElement('video'); v.autoplay=true; v.playsInline=true; v.muted=true; v.style.cssText='max-width:92%;max-height:70%;border-radius:14px';
  const hint=document.createElement('div'); hint.textContent='Point the camera at the QR code on the box'; hint.style.cssText='color:#fff;font-size:14px';
  const cancel=document.createElement('button'); cancel.className='primary'; cancel.textContent='Cancel'; cancel.style.width='auto';
  ov.append(hint,v,cancel); document.body.appendChild(ov); v.srcObject=stream;
  const det=new window.BarcodeDetector({formats:['qr_code']}); let live=true;
  const stop=()=>{ live=false; stream.getTracks().forEach(t=>t.stop()); ov.remove(); };
  cancel.onclick=stop;
  const loop=async()=>{ if(!live) return; try{ const codes=await det.detect(v); if(codes&&codes[0]){ stop(); onResult(codes[0].rawValue||''); return; } }catch(_){ } if(live) requestAnimationFrame(loop); };
  v.onloadedmetadata=()=>loop();
}

function drawConnect(){
  const cloudMode=location.protocol==='https:'&&!!CFG.mqttWsUrl;
  render(`${header('CryptoClock Pro', false, `<div class="act" id="out">Sign out</div>`)}<main>
    ${cloudMode?`<div class="sub" style="margin:2px 0 6px;font-weight:600">My CryptoClocks</div>

    <div class="panel" style="margin-top:6px">
      <div class="ttl" style="font-size:15px;margin-bottom:8px">Add a device</div>
      <div class="sub" style="margin-bottom:8px">Scan the QR on the box, or type the Device ID + claim code printed on the label.</div>
      <div class="row"><input class="grow" id="cid" type="text" placeholder="Device ID (CCP000001)"><button id="scan" style="width:auto">📷 Scan</button></div>
      <div class="row" style="margin-top:8px"><input class="grow" id="ccode" type="text" placeholder="Claim code"><button class="primary" id="claim" style="width:auto">Add</button></div>

      <div class="sub" style="margin-bottom:8px">Already linked? Connect by Device ID:</div>
      <div class="row"><input class="grow" id="ip" type="text" placeholder="ccp-xxxxxxxxxxxx" value="${esc(LS.get('ccp_last_device')||'')}"><button class="primary" id="connect" style="width:auto">Connect</button></div>
      <div id="cerr" class="err small" style="margin-top:8px"></div>
    </div>`
    :`<div class="panel"><div class="sub" style="margin-bottom:8px">Enter your display's IP address. Local mode works only on the same WiFi over HTTP.</div>
      <div class="row"><input class="grow" id="ip" type="text" placeholder="192.168.1.x" value="${esc(LS.get('ccp_last_ip')||'')}"><button class="primary" id="connect" style="width:auto">Connect</button></div>
      <div id="cerr" class="err small" style="margin-top:8px"></div>
    </div>`}
    <div class="sub" style="text-align:center;margin-top:8px">Signed in as ${esc(Auth.email()||'')}</div>
    <div class="panel" style="margin-top:14px"><div class="sub">New device? Join its WiFi <b>CCP-Setup-XXXX</b> and open <b>http://192.168.4.1</b> to set up WiFi first.</div></div>
  </main>`);
  el('out').onclick=()=>{ Auth.signOut(); go('welcome'); };

  const connectTo=async(id, btn)=>{
    if(!id) return;
    const b=btn||el('connect'); const lbl=b.textContent; b.disabled=true; b.textContent='…'; if(el('cerr')) el('cerr').textContent='';
    try{ const api=cloudMode?new CloudDeviceApi(await MqttRpc.connect(),id):new DeviceApi(id); const info=await api.info(); LS.set(cloudMode?'ccp_last_device':'ccp_last_ip', id);
      App.ctrl=new Ctrl(api, info); await App.ctrl.load(); go('device');
    }catch(e){ if(el('cerr')) el('cerr').textContent=cloudMode?'Cannot reach this device through the MQTT gateway. ('+e+')':'Cannot reach device at '+id+' — use local HTTP and the same WiFi. ('+e+')'; b.disabled=false; b.textContent=lbl; }
  };
  el('connect').onclick=()=>connectTo(el('ip').value.trim());

  if(!cloudMode) return;

  async function loadMyDevices(){
    const box=el('mydevs'); if(!box) return;
    const devs=await Hub.myDevices();
    if(!devs.length){ box.innerHTML='<div class="panel"><div class="sub">No devices linked yet. Add one below 👇</div></div>'; return; }
    box.innerHTML=devs.map(d=>{
      const id=esc(d.deviceId||''); const nm=esc(d.name||d.deviceId||'CryptoClock');
      const pill = (typeof d.online==='boolean')
        ? `<span class="pill" style="font-size:11px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.online?'#22c55e':'#6b7280'};margin-right:5px"></span>${d.online?'online':'offline'}</span>`
        : '<span class="sub" style="font-size:18px">›</span>';
      return `<div class="panel devcard" data-id="${id}" style="display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px">
        <div class="ico" style="width:42px;height:42px;font-size:22px;background:rgba(240,185,11,.14);color:var(--accent)">⌚</div>
        <div class="grow"><div class="ttl">${nm}</div><div class="sub" style="margin-top:2px">${id}</div></div>
        ${pill}
      </div>`;
    }).join('');
    box.querySelectorAll('.devcard').forEach(card=>card.onclick=()=>connectTo(card.dataset.id, card));
    /* Auto-connect: a signed-in owner with a single linked device (or one that
       matches the last-used id) goes straight to it — no Connect tap. Done at
       most once per session so the Back button still lands here, and skipped
       for a known-offline device so we don't hang on the RPC timeout. */
    if(!App.autoConnectTried){
      App.autoConnectTried=true;
      const last=LS.get('ccp_last_device');
      const target=devs.length===1?devs[0]:devs.find(d=>d.deviceId===last);
      if(target && target.online!==false){ connectTo(target.deviceId); }
    }
  }
  loadMyDevices();

  el('scan').onclick=()=>scanQR(text=>{ const p=parseClaim(text); if(p.id) el('cid').value=p.id; if(p.code) el('ccode').value=p.code; if(p.id) toast('Scanned '+p.id,'ok'); else toast('No device ID in that QR','err'); });

  el('claim').onclick=async()=>{
    const id=el('cid').value.trim(), code=el('ccode').value.trim();
    if(!id||!code){ el('aerr').textContent='Enter both the Device ID and the claim code.'; return; }
    const b=el('claim'); b.disabled=true; b.textContent='…'; el('aerr').textContent='';
    const r=await Hub.claim(id, code);
    b.disabled=false; b.textContent='Add';
    if(r.error){ el('aerr').textContent=r.error; return; }
    toast('Device added ✓','ok'); el('cid').value=''; el('ccode').value='';
    await loadMyDevices();
    connectTo(id);
  };
}

const CLOCK_THEMES={ Cyan:{time:'#00D1FF',sec:'#FF9500',date:'#848E9C',bg:'#0B0E11'}, Gold:{time:'#F0B90B',sec:'#FF9500',date:'#848E9C',bg:'#0B0E11'}, Mint:{time:'#0ECB81',sec:'#A0F0D0',date:'#7A8A85',bg:'#06120E'}, Neon:{time:'#FF2E97',sec:'#00E5FF',date:'#9A6A8A',bg:'#0A0014'}, Mono:{time:'#FFFFFF',sec:'#BBBBBB',date:'#888888',bg:'#000000'} };
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function daysLabel(d){ d=d||[]; if(!d.length)return'Once'; if(d.length===7)return'Every day'; if(JSON.stringify([...d].sort())===JSON.stringify([1,2,3,4,5]))return'Weekdays'; return [...d].sort().map(n=>DOW[n-1]).join(' '); }
function drawClock(){
  const c=App.ctrl, s=c.section('clock');
  const alarms=(s.alarms||[]).map(a=>typeof a==='object'?a:{});
  const alarmsPanel = c.has('clock-alarm') ? `
    <div class="panel"><div class="ttl" style="margin-bottom:8px">Alarm <span class="sub">(${alarms.length}/8)</span></div>
      <div>${alarms.length?alarms.map((a,i)=>`<div class="row" style="margin:9px 0"><div class="grow"><div class="ttl">${esc(a.time||'--:--')}${a.label?' · '+esc(a.label):''}</div><div class="sub">${esc(daysLabel(a.days))}</div></div><label class="switch"><input type="checkbox" data-aen="${i}" ${a.enabled!==false?'checked':''}><span></span></label><button class="danger" data-adel="${i}">✕</button></div>`).join(''):'<div class="muted small">No alarms yet.</div>'}</div>
      <div style="margin-top:10px;border-top:1px solid var(--line);padding-top:12px">
        <div class="row" style="gap:8px"><input id="am_time" type="time" value="07:00" style="width:auto"><input id="am_label" type="text" placeholder="Label (optional)" class="grow"></div>
        <div id="am_days" style="margin-top:8px">${DOW.map((d,i)=>`<span class="chip" data-day="${i+1}" style="cursor:pointer;user-select:none">${d}</span>`).join('')}</div>
        <button id="am_add" style="width:100%;margin-top:10px">＋ Add alarm</button></div></div>`
    : lockedFeature(c,'clock-alarm','clock','alarm');
  settingsPage('Clock', `
    <div class="panel">${toggleRow('24-hour time','c24', s.format_24h!==false)}
      ${toggleRow('Show seconds','csec', s.show_seconds!==false)}
      ${toggleRow('Show date','cdate', s.show_date!==false)}
      ${toggleRow('Show logo','clogo', s.show_logo===true)}
      ${selectRow('Date format','cdfmt', s.date_format||'D MMM YYYY', ['D MMM YYYY','DD/MM/YYYY','MM/DD/YYYY','YYYY-MM-DD'])}
      ${field('Timezone offset (minutes)','ctz', s.tz_offset_min??420, 'number')}</div>
    <div class="panel">${selectRow('Theme preset','ctheme','', [['','— custom —'],...Object.keys(CLOCK_THEMES)])}
      ${colorField('Time colour','ctimec', s.time_color||'#00D1FF')}
      ${colorField('Seconds colour','csecc', s.sec_color||'#FF9500')}
      ${colorField('Date colour','cdatec', s.date_color||'#848E9C')}
      ${colorField('Background','cbg', s.bg_color||'#0B0E11')}</div>
    ${alarmsPanel}
  `, (c)=>{ c.patch('clock','format_24h',el('c24').checked); c.patch('clock','show_seconds',el('csec').checked); c.patch('clock','show_date',el('cdate').checked); c.patch('clock','show_logo',el('clogo').checked); c.patch('clock','date_format',el('cdfmt').value); c.patch('clock','tz_offset_min',parseInt(el('ctz').value)||420); c.patch('clock','time_color',el('ctimec').value); c.patch('clock','sec_color',el('csecc').value); c.patch('clock','date_color',el('cdatec').value); c.patch('clock','bg_color',el('cbg').value); });
  el('ctheme').onchange=()=>{ const t=CLOCK_THEMES[el('ctheme').value]; if(!t) return; el('ctimec').value=t.time; el('csecc').value=t.sec; el('cdatec').value=t.date; el('cbg').value=t.bg; el('app').querySelectorAll('[data-color]').forEach(b=>{ b.style.background=el(b.dataset.color).value; }); };
  bindLocked(el('app'), c);
  const nd=new Set();
  el('app').querySelectorAll('[data-day]').forEach(ch=>ch.onclick=()=>{ const n=+ch.dataset.day; if(nd.has(n)){ nd.delete(n); ch.style.background=''; ch.style.color=''; } else { nd.add(n); ch.style.background='rgba(240,185,11,.22)'; ch.style.color='var(--accent)'; } });
  if(el('am_add')) el('am_add').onclick=()=>{ if(alarms.length>=8) return toast('Max 8 alarms','err'); c.patch('clock','alarms',[...alarms,{time:el('am_time').value,label:el('am_label').value.trim(),days:[...nd].sort((a,b)=>a-b),enabled:true,sound:'beep'}]); drawClock(); };
  el('app').querySelectorAll('[data-aen]').forEach(t=>t.onchange=()=>{ const i=+t.dataset.aen; c.patch('clock','alarms',alarms.map((a,x)=>x===i?{...a,enabled:t.checked}:a)); });
  el('app').querySelectorAll('[data-adel]').forEach(b=>b.onclick=()=>{ c.patch('clock','alarms',alarms.filter((_,i)=>i!==+b.dataset.adel)); drawClock(); });
}

function drawCrypto(){
  const c=App.ctrl, s=c.section('crypto');
  const COINS=['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT','LINKUSDT','TONUSDT','TRXUSDT','DOTUSDT'];
  const chips=c.symbols.map(sy=>`<span class="chip">${esc(sy.replace('USDT',''))} <b data-rm="${esc(sy)}">✕</b></span>`).join('');
  const addable=COINS.filter(x=>!c.symbols.includes(x));
  const alerts=(s.alerts||[]).map(a=>typeof a==='object'?a:{});
  const alertsPanel = c.has('crypto-alerts') ? `
    <div class="panel"><div class="ttl" style="margin-bottom:8px">Price alerts <span class="sub">(${alerts.length}/8)</span></div>
      <div>${alerts.length?alerts.map((a,i)=>`<div class="row" style="margin:7px 0"><div class="grow">${esc((a.symbol||'').replace('USDT',''))} · <b style="color:${a.dir==='below'?'#ff7a7a':'#0ECB81'}">${a.dir==='below'?'↓ below':'↑ above'}</b> ${esc(a.price)}</div><button class="danger" data-dal="${i}">✕</button></div>`).join(''):'<div class="muted small">No alerts yet.</div>'}</div>
      <div class="row" style="margin-top:10px;gap:6px"><select id="al_sym" class="grow">${c.symbols.map(x=>`<option value="${esc(x)}">${esc(x.replace('USDT',''))}</option>`).join('')}</select>
        <select id="al_dir" style="width:auto"><option value="above">↑ above</option><option value="below">↓ below</option></select>
        <input id="al_price" type="number" placeholder="price" style="width:88px"><button id="al_add" style="width:auto">Add</button></div></div>`
    : lockedFeature(c,'crypto-alerts','crypto','alerts');
  settingsPage('Crypto', `
    <div class="panel"><div class="ttl" style="margin-bottom:6px">Coins <span class="sub">(${c.symbols.length})</span></div>
      <div id="chips">${chips||'<span class="muted small">none</span>'}</div>
      <div class="row" style="margin-top:10px"><select class="grow" id="addsym">${addable.map(x=>`<option>${x}</option>`).join('')}</select><button id="addbtn" style="width:auto">＋ Add</button></div></div>
    <div class="panel">${selectRow('Style','cstyle', s.style||'chart', [['chart','price + graph'],['big','big price']])}
      ${selectRow('Timeframe','ctf', s.timeframe||'15m', ['1m','5m','15m','1h','4h','1d'])}
      ${selectRow('Currency','ccur', s.currency||'USD', ['USD','THB'])}
      ${field('Refresh seconds','cfetch', s.fetch_interval_s??10, 'number')}</div>
    ${alertsPanel}
  `, (cc)=>{ cc.patch('crypto','style',el('cstyle').value); cc.patch('crypto','timeframe',el('ctf').value); cc.patch('crypto','currency',el('ccur').value); cc.patch('crypto','fetch_interval_s',parseInt(el('cfetch').value)||10); });
  el('addbtn').onclick=()=>{ const v=el('addsym').value; if(v&&!c.symbols.includes(v)){ c.patch('crypto','symbols',[...c.symbols,v]); drawCrypto(); } };
  el('app').querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ c.patch('crypto','symbols', c.symbols.filter(x=>x!==b.dataset.rm)); drawCrypto(); });
  bindLocked(el('app'), c);
  if(el('al_add')) el('al_add').onclick=()=>{ const price=parseFloat(el('al_price').value); if(!price||price<=0) return toast('Enter a price','err'); if(alerts.length>=8) return toast('Max 8 alerts','err'); c.patch('crypto','alerts',[...alerts,{symbol:el('al_sym').value,dir:el('al_dir').value,price}]); drawCrypto(); };
  el('app').querySelectorAll('[data-dal]').forEach(b=>b.onclick=()=>{ c.patch('crypto','alerts',alerts.filter((_,i)=>i!==+b.dataset.dal)); drawCrypto(); });
}

function drawProfile(){
  const c=App.ctrl, s=c.section('profile');
  const social=(plat,label,url,fol,fwg,sec)=>`<div class="panel"><div class="ttl" style="margin-bottom:6px">${label}</div>
    ${field('Profile URL','p_'+plat+'_url', s[plat+'_url']||'')}
    <div class="grid2">${field('Followers','p_'+plat+'_fol', s[plat+'_followers']||'')}${field('Following','p_'+plat+'_fwg', s[plat+'_following']||'')}</div>
    ${field('Secondary label','p_'+plat+'_sec', s[plat+'_secondary_label']||'')}</div>`;
  const avSrc = c.api.supportsFiles&&s.avatar ? c.api.fileUrl(s.avatar)+'&t='+Date.now() : '';
  const avPanel = `<div class="panel"><div class="row">
    <div id="avwrap" style="width:64px;height:64px;border-radius:16px;overflow:hidden;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:30px;flex:none;box-shadow:0 0 0 1px rgba(255,255,255,.05) inset">${avSrc?`<img src="${avSrc}" style="width:100%;height:100%;object-fit:cover">`:'👤'}</div>
    <div class="grow"><div class="ttl">Profile photo</div><div class="sub">${c.api.uploads?'Square · auto-resized to 132×132 PNG':'Upload from the mobile app on the same WiFi'}</div></div>
    ${c.api.uploads?'<button id="avup" style="width:auto">Upload</button>':''}</div>
    <input type="file" id="avfile" accept="image/*" style="display:none"></div>`;
  settingsPage('Profile', `${avPanel}
    <div class="panel">${toggleRow('Show this page', 'p_show', s.show!==false)}
      ${field('Name','p_name', s.name||'')}${field('Nickname','p_nick', s.nickname||'')}
      ${field('Role','p_role', s.role||'')}${field('Motto','p_motto', s.motto||'')}${field('Company','p_company', s.company||'')}</div>
    <div class="panel"><div class="secttl">Colours</div>
      ${colorField('Name','p_namec', s.name_color||'#F0B90B')}${colorField('Role','p_rolec', s.role_color||'#848E9C')}
      ${colorField('Company','p_compc', s.company_color||'#848E9C')}${colorField('Verify badge','p_verc', s.verify_color||'#00D1FF')}
      ${colorField('Background','p_bgc', s.bg_color||'#0B0E11')}</div>
    ${social('fb','Facebook')}${social('yt','YouTube')}${social('tt','TikTok')}${social('ig','Instagram')}
    <button id="resolveSoc" style="width:100%">⟳ Auto-fill follower counts from URLs</button>
  `, (c)=>{ const g=(id)=>el(id).value.trim();
    c.patch('profile','show',el('p_show').checked);
    c.patch('profile','name',g('p_name')); c.patch('profile','nickname',g('p_nick')); c.patch('profile','role',g('p_role')); c.patch('profile','motto',g('p_motto')); c.patch('profile','company',g('p_company'));
    c.patch('profile','name_color',g('p_namec')); c.patch('profile','role_color',g('p_rolec')); c.patch('profile','company_color',g('p_compc')); c.patch('profile','verify_color',g('p_verc')); c.patch('profile','bg_color',g('p_bgc'));
    for(const p of ['fb','yt','tt','ig']){ c.patch('profile',p+'_url',g('p_'+p+'_url')); c.patch('profile',p+'_followers',g('p_'+p+'_fol')); c.patch('profile',p+'_following',g('p_'+p+'_fwg')); c.patch('profile',p+'_secondary_label',g('p_'+p+'_sec')); }
  });
  if(el('avup')) el('avup').onclick=()=>el('avfile').click();
  if(el('avfile')) el('avfile').onchange=async()=>{ const f=el('avfile').files[0]; if(!f) return;
    el('avup').disabled=true; el('avup').textContent='…'; toast('Uploading photo…');
    try{ const png=await imgToSquarePng(f, 132); await c.api.upload('pages/profile/assets/avatar.png', png);
      if(c.api.mode==='lan' && CFG.hubBase && /^CCP\d{6}$/i.test(c.deviceId)){
        try{ await Hub.uploadAsset(c.deviceId, 'profile', 'avatar', png); }
        catch(err){ console.warn('Hub avatar sync failed', err); }
      }
      c.patch('profile','avatar','pages/profile/assets/avatar.png');
      const url=URL.createObjectURL(new Blob([png],{type:'image/png'}));
      el('avwrap').innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
      toast('Photo uploaded — press Save to apply','ok');
    }catch(e){ toast('Upload failed: '+e,'err'); }
    el('avup').disabled=false; el('avup').textContent='Upload'; };
  el('resolveSoc').onclick=async()=>{ const map={fb:'facebook',yt:'youtube',tt:'tiktok',ig:'instagram'};
    const todo=Object.keys(map).filter(p=>el('p_'+p+'_url').value.trim());
    if(!todo.length) return toast('Add at least one social URL first','err');
    const b=el('resolveSoc'); b.disabled=true; b.textContent='Fetching…'; let n=0;
    for(const p of todo){ const d=await Hub.resolveSocial(el('p_'+p+'_url').value.trim(), map[p]);
      if(d.error){ toast(p.toUpperCase()+': '+d.error,'err'); continue; }
      el('p_'+p+'_fol').value=(d.followers??d.likes??'')+''; el('p_'+p+'_fwg').value=(d.secondaryValue??d.following??d.talkingAbout??'')+''; n++; }
    b.disabled=false; b.textContent='⟳ Auto-fill follower counts from URLs'; if(n) toast('Updated '+n+' — press Save','ok'); };
}

async function drawPhotos(){
  const c=App.ctrl, s=c.section('slideshow');
  if(!c.api.supportsFiles){
    return settingsPage('Photo slideshow', `
      <div class="panel">${selectRow('Order','ph_order', s.order||'upload', [['upload','Upload order'],['name','By name'],['random','Random']])}
        ${selectRow('Effect','ph_effect', s.effect||'fade', ['fade','slide','none'])}
        ${field('Seconds per photo','ph_int', s.interval_s??6, 'number')}</div>
      <div class="panel sub">Photo files stay on the display SD card. Upload, delete, and reorder files from the mobile app while on the same WiFi.</div>
    `,(cc)=>{cc.patch('slideshow','order',el('ph_order').value);cc.patch('slideshow','effect',el('ph_effect').value);cc.patch('slideshow','interval_s',parseInt(el('ph_int').value)||6);});
  }
  render(`${header('Photo slideshow', true, `<div class="act" id="save">Save</div>`)}<main>
    <div class="panel">${selectRow('Order','ph_order', s.order||'upload', [['upload','Upload order'],['name','By name'],['random','Random']])}
      ${selectRow('Effect','ph_effect', s.effect||'fade', ['fade','slide','none'])}
      ${field('Seconds per photo','ph_int', s.interval_s??6, 'number')}
      <button class="primary" id="saveBtn" style="margin-top:12px">Save settings</button></div>
    <div class="panel"><div class="row"><div class="grow ttl">Photos</div><button id="addphoto" style="width:auto">＋ Upload</button></div>
      <input type="file" id="file" accept="image/png,image/jpeg" style="display:none">
      <div id="files" class="sub" style="margin-top:10px">Loading…</div></div>
  </main>`);
  const collect=()=>{ c.patch('slideshow','order',el('ph_order').value); c.patch('slideshow','effect',el('ph_effect').value); c.patch('slideshow','interval_s',parseInt(el('ph_int').value)||6); };
  const save=async()=>{ collect(); try{ await c.save(); toast('Saved','ok'); }catch(e){ toast('Save failed: '+e,'err'); } };
  el('save').onclick=save; el('saveBtn').onclick=save;
  async function refresh(){
    try{ const r=await c.api.listFiles('pages/slideshow/assets');
      if(!r.sd){ el('files').innerHTML='<span class="err">No SD card in the display.</span>'; return; }
      if(!r.files.length){ el('files').innerHTML='No photos yet — tap Upload.'; return; }
      el('files').innerHTML='<div class="grid2">'+r.files.map(f=>`<div class="row"><img class="thumb" src="${c.api.fileUrl('pages/slideshow/assets/'+f.name)}"><div class="grow small">${esc(f.name)}<br><span class="muted">${(f.size/1024|0)} KB</span></div><button class="danger" data-del="${esc(f.name)}">✕</button></div>`).join('')+'</div>';
      el('files').querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{ await c.api.del('pages/slideshow/assets/'+b.dataset.del); toast('Deleted'); refresh(); });
    }catch(e){ el('files').innerHTML='<span class="err">Cannot list files: '+esc(String(e))+'</span>'; }
  }
  el('addphoto').onclick=()=>el('file').click();
  el('file').onchange=async()=>{ const f=el('file').files[0]; if(!f) return; toast('Uploading '+f.name+'…');
    try{ const buf=new Uint8Array(await f.arrayBuffer()); const name=f.name.replace(/[^a-zA-Z0-9._-]/g,'_'); await c.api.upload('pages/slideshow/assets/'+name, buf); toast('Uploaded','ok'); refresh(); }
    catch(e){ toast('Upload failed: '+e,'err'); } };
  refresh();
}

function drawWeather(){
  const c=App.ctrl, s=c.section('weather');
  const GIFPATH='pages/weather/assets/bg.gif';
  const opts=[['auto','Auto by weather'],['clear','Clear'],['cloudy','Cloudy'],['rain','Rain'],['snow','Snow'],['none','None'],[GIFPATH,'Custom uploaded GIF']];
  settingsPage('Weather', `
    <div class="panel">${field('City','w_city', s.city||'Bangkok')}
      ${toggleRow('Show PM2.5 / PM10 air quality','w_pm', s.show_pm===true)}
      ${selectRow('Background animation','w_gif', s.bg_gif||'auto', opts)}
      <div class="row" style="margin-top:10px"><div class="grow sub">${c.api.uploads?'Or upload your own animated .gif':'Custom GIF uploads use the mobile app on the same WiFi'}</div>${c.api.uploads?'<button id="wgifup" style="width:auto">Upload .gif</button>':''}</div>
      <input type="file" id="wgiffile" accept="image/gif" style="display:none">
      ${colorField('Background colour','w_bg', s.bg_color||'#0B0E11')}</div>
  `, (cc)=>{ cc.patch('weather','city',el('w_city').value.trim()); cc.patch('weather','show_pm',el('w_pm').checked); cc.patch('weather','bg_gif',el('w_gif').value); cc.patch('weather','bg_color',el('w_bg').value); });
  if(el('wgifup')) el('wgifup').onclick=()=>el('wgiffile').click();

      el('w_gif').value=GIFPATH; toast('GIF uploaded — press Save to apply','ok');
    }catch(e){ toast('Upload failed: '+e,'err'); }
    el('wgifup').disabled=false; el('wgifup').textContent='Upload .gif'; };
}

async function drawStore(){
  const c=App.ctrl;
  render(`${header('Store', true)}<main><div id="items"><div class="center"><span class="spin"></span></div></div></main>`);
  const items=(c.catalog||[]).filter(i=>i.priceCents!=null);
  const list = items.length? items.map(i=>{ const owned=c.has(i.slug); const price=i.priceCents===0?'Free':`$${(i.priceCents/100).toFixed(2)}`;
    return `<div class="panel"><div class="row"><div class="grow"><div class="ttl">${esc(i.title||i.slug)} <span class="sub">${esc(i.kind||'')}</span></div><div class="sub">${esc(i.description||'')}</div></div>
      ${owned?'<span class="ok">✓ Owned</span>':`<button data-buy="${esc(i.slug)}" style="width:auto">${price}</button>`}</div></div>`;
  }).join('') : '<div class="panel sub">No store items available.</div>';
  el('items').innerHTML=list;
  el('items').querySelectorAll('[data-buy]').forEach(b=>b.onclick=async()=>{ b.disabled=true; b.textContent='…';
    const res=await Hub.checkout(b.dataset.buy, c.deviceId);
    if(res.url){ location.href=res.url; } else if(res.configured===false){ toast('Store not configured (Stripe keys missing)','err'); b.disabled=false; b.textContent='Buy'; } else { toast(res.error||'Checkout failed','err'); b.disabled=false; b.textContent='Buy'; }
  });
}
